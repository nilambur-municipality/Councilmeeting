<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swaram - Nilambur Council Meeting Assistant</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            color: #333; margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            background-color: #ffffff; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 30px;
            width: 100%; max-width: 600px; border-top: 8px solid #2e7d32; text-align: center;
        }
        h1 { color: #2e7d32; margin-bottom: 5px; font-size: 26px; }
        .subtitle { font-style: italic; color: #555; margin-bottom: 25px; font-size: 15px; }
        
        .section-box {
            background: #e8f5e9; border: 1px solid #a5d6a7; border-radius: 10px;
            padding: 20px; margin-bottom: 20px; text-align: left;
        }
        
        input[type="file"] {
            width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ccc;
            border-radius: 5px; box-sizing: border-box; background: white; font-size: 14px;
        }
        
        button {
            padding: 14px 20px; font-size: 15px; font-weight: bold; border: none;
            border-radius: 8px; cursor: pointer; transition: all 0.3s ease; width: 100%; margin-top: 15px;
        }
        .btn-green { background-color: #2e7d32; color: white; }
        .btn-blue { background-color: #1976d2; color: white; }
        
        button:disabled { background-color: #cccccc !important; color: #666 !important; cursor: not-allowed; border:none;}
        
        .status { font-weight: bold; margin: 15px 0; color: #d32f2f; font-size: 15px;}
        
        textarea {
            width: 100%; height: 300px; padding: 15px; border: 1px solid #a5d6a7;
            border-radius: 8px; background-color: #fff; resize: vertical;
            font-size: 15px; line-height: 1.6; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Swaram (സ്വരം)</h1>
    <div class="subtitle">Nilambur Municipality Auto-Transcriber</div>

    <div class="section-box">
        <label><b>🎙️ മീറ്റിംഗ് ഓഡിയോ നൽകുക (MP3/M4A):</b></label>
        <input type="file" id="audioFile" accept="audio/*">
        <button id="uploadBtn" class="btn-green">📤 Upload & Transcribe</button>
    </div>

    <div class="status" id="statusLabel">ഓഡിയോ ഫയൽ അപ്‌ലോഡ് ചെയ്യാൻ തയ്യാറാണ്...</div>

    <textarea id="outputText" placeholder="നിലമ്പൂർ മുനിസിപ്പാലിറ്റി മീറ്റിംഗ് റിപ്പോർട്ടും തീരുമാനങ്ങളും ഇവിടെ അക്ഷരങ്ങളായി വരും..."></textarea>
    <button id="copyBtn" class="btn-blue">📋 Copy Full Report</button>
</div>

<script>
    const audioFileInput = document.getElementById('audioFile');
    const uploadBtn = document.getElementById('uploadBtn');
    const statusLabel = document.getElementById('statusLabel');
    const outputText = document.getElementById('outputText');
    const copyBtn = document.getElementById('copyBtn');

    // അച്ഛൻ നൽകിയ API Key എൻക്രിപ്റ്റ് ചെയ്ത് ഒളിപ്പിച്ചു വെച്ചിരിക്കുന്നു
    // ഇത് നേരിട്ട് കണ്ടാൽ ആർക്കും മനസ്സിലാകില്ല
    const _0x1a = "QVEuQWI4Uk42SnpVVm";
    const _0x2b = "9HS04tbDFpMjRicEpO";
    const _0x3c = "VlZqdzRhXzVPc2hmNz";
    const _0x4d = "ZjQjRwdzlHdjktS2c=";
    
    function getAuthToken() {
        return atob(_0x1a + _0x2b + _0x3c + _0x4d);
    }

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });
    }

    uploadBtn.addEventListener('click', async () => {
        const file = audioFileInput.files[0];

        if (!file) {
            alert("ദയവായി റെക്കോർഡ് ചെയ്ത മീറ്റിംഗ് ഓഡിയോ തിരഞ്ഞെടുക്കുക!"); return;
        }

        uploadBtn.disabled = true;
        outputText.value = "";
        statusLabel.innerText = "പ്രോസസ്സ് ചെയ്യുന്നു... വലിയ മീറ്റിംഗുകൾക്ക് അല്പം സമയമെടുക്കും.";
        statusLabel.style.color = "#1976d2";

        try {
            const base64Audio = await fileToBase64(file);
            const mimeType = file.type || "audio/mp3";
            const hiddenKey = getAuthToken();

            // നിലമ്പൂർ മുൻസിപ്പാലിറ്റിയുടെ പുതിയ ഭരണസമിതി ഉൾപ്പെടുത്തിയ പ്രോംപ്റ്റ്
            const promptText = `Act as a professional Municipality Council Secretary for Nilambur Municipality (നിലമ്പൂർ മുൻസിപ്പാലിറ്റി), Kerala. Listen to this Malayalam council meeting recording. 

[CONTEXT FOR SPEAKER IDENTIFICATION - CURRENT COUNCIL]: 
The current leadership includes Chairperson Padmini Gopinath, Vice Chairperson Shoukkathali Koomanchery, and Secretary Ferose Khan. The council consists of 33 ward members including Gireesh Moloormadathil, Aruma P T, Bushra Muneeb, Mumthas, Sameera K P, Velukutty N, Hamza P V, Musthafa K, Asrath, P M Basheer, Kunhimuhammed, Suresh P, Sreeja, Thongodan Sundaran, Sherly Mol, E S Mujeeb, Paloly Mehaboob, Geetha, Adukkath Ishak, Naicy, Gopinathan, Noorjahan P, Subaida Thattarasseri, Gopalakrishnan P, Unnikrishnan, Shareefa, Daisy Chacko, Mujeeb Devasseri, Sindhu, Sumeera P, Radha P, Binu.

[TASKS]:
1. Transcribe the discussion clearly in Malayalam.
2. Fix all grammatical and speech errors to make it an official document.
3. Identify different speakers accurately by matching their names from the current council list when someone is addressed. Use formats like "ചെയർപേഴ്സൺ പത്മിനി ഗോപിനാഥ്:" or "സെക്രട്ടറി ഫിറോസ് ഖാൻ:".
4. Provide a clear, bulleted summary of the Key Decisions taken at the end.`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${hiddenKey}`;

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: promptText },
                            { inlineData: { mimeType: mimeType, data: base64Audio } }
                        ]
                    }]
                })
            });

            const data = await response.json();

            if (data.error) {
                console.error("API Error:", data.error);
                if (data.error.code === 429) {
                    statusLabel.innerText = "Error 429: ഫയലിന്റെ വലിപ്പം കൂടുതലാണ്. ചെറിയ ഫയലുകൾ നൽകുക.";
                } else {
                    statusLabel.innerText = `Error: ${data.error.message}`;
                }
                statusLabel.style.color = "#d32f2f";
            } 
            else if (data.candidates && data.candidates[0].content.parts[0].text) {
                outputText.value = data.candidates[0].content.parts[0].text;
                statusLabel.innerText = "റിപ്പോർട്ട് തയ്യാറാക്കൽ പൂർത്തിയായി! ✨";
                statusLabel.style.color = "#2e7d32";
            } 
            else {
                statusLabel.innerText = "മറുപടി ലഭിക്കുന്നതിൽ തകരാർ സംഭവിച്ചു.";
                statusLabel.style.color = "#d32f2f";
            }

        } catch (err) {
            console.error(err);
            statusLabel.innerText = "നെറ്റ്‌വർക്ക് തകരാർ! ഇന്റർനെറ്റ് കണക്ഷൻ പരിശോധിക്കുക.";
            statusLabel.style.color = "#d32f2f";
        }

        uploadBtn.disabled = false;
    });

    copyBtn.addEventListener('click', () => {
        if (!outputText.value) {
            alert("കോപ്പി ചെയ്യാൻ വിവരങ്ങളില്ല!"); return;
        }
        navigator.clipboard.writeText(outputText.value).then(() => {
            alert("റിപ്പോർട്ട് പൂർണ്ണമായും കോപ്പിയായി! ഇത് നേരിട്ട് ഉപയോഗിക്കാം.");
        });
    });
</script>

</body>
</html>
