<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swaram - Nilambur Council Meeting Assistant</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            color: #333; margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        .container {
            background-color: #ffffff; border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 30px;
            width: 100%; max-width: 600px; border-top: 8px solid #2e7d32; text-align: center;
        }
        h1 { color: #2e7d32; margin-bottom: 5px; font-size: 26px; }
        .subtitle { font-style: italic; color: #555; margin-bottom: 25px; font-size: 15px; }
        
        .section-box {
            background: #f1f8e9; border: 1px solid #a5d6a7; border-radius: 10px;
            padding: 20px; margin-bottom: 20px; text-align: left;
        }
        
        input[type="password"], input[type="file"] {
            width: 100%; padding: 12px; margin-top: 10px; border: 1px solid #ccc;
            border-radius: 5px; box-sizing: border-box; background: white; font-size: 14px;
        }
        
        button {
            padding: 14px 20px; font-size: 15px; font-weight: bold; border: none;
            border-radius: 8px; cursor: pointer; transition: all 0.3s ease; width: 100%; margin-top: 15px;
        }
        .btn-green { background-color: #2e7d32; color: white; }
        .btn-blue { background-color: #1976d2; color: white; }
        .btn-outline { background-color: transparent; border: 1px solid #2e7d32; color: #2e7d32; margin-top: 10px; padding: 8px; font-size: 13px;}
        
        button:disabled { background-color: #cccccc !important; color: #666 !important; cursor: not-allowed; border:none;}
        
        .status { font-weight: bold; margin: 15px 0; color: #d32f2f; font-size: 15px;}
        
        textarea {
            width: 100%; height: 300px; padding: 15px; border: 1px solid #a5d6a7;
            border-radius: 8px; background-color: #fff; resize: vertical;
            font-size: 15px; line-height: 1.6; box-sizing: border-box;
        }
        .small-text { font-size: 12px; color: #666; margin-top: 8px; line-height: 1.4;}
    </style>
</head>
<body>

<div class="container">
    <h1>Swaram (സ്വരം)</h1>
    <div class="subtitle">Nilambur Municipality Auto-Transcriber</div>

    <div id="setupSection" class="section-box">
        <label><b>🔑 ഗൂഗിൾ API Key നൽകുക:</b></label>
        <input type="password" id="apiKeyInput" placeholder="AQ. അല്ലെങ്കിൽ AIza എന്ന് തുടങ്ങുന്ന Key നൽകുക">
        <button id="saveKeyBtn" class="btn-green">💾 Save & Continue</button>
        <div class="small-text">കുറിപ്പ്: ഇത് ഗിറ്റ്ഹബ്ബിൽ പബ്ലിഷ് ചെയ്യുമ്പോൾ ആർക്കും കാണാൻ കഴിയില്ല. ഈ Key ഫോണിന്റെ ബ്രൗസറിൽ മാത്രം സുരക്ഷിതമായി ഒളിപ്പിച്ചു വെക്കും. ഇനി ആപ്പ് തുറക്കുമ്പോൾ ഈ സ്ക്രീൻ കാണില്ല.</div>
    </div>

    <div id="mainSection" style="display: none;">
        <div class="section-box" style="background: #e8f5e9;">
            <label><b>🎙️ മീറ്റിംഗ് ഓഡിയോ നൽകുക (MP3/M4A):</b></label>
            <input type="file" id="audioFile" accept="audio/*">
            <button id="uploadBtn" class="btn-green">📤 Upload & Transcribe</button>
            <button id="resetKeyBtn" class="btn-outline">⚙️ Change API Key</button>
        </div>

        <div class="status" id="statusLabel">ഓഡിയോ ഫയൽ അപ്‌ലോഡ് ചെയ്യാൻ തയ്യാറാണ്...</div>

        <textarea id="outputText" placeholder="നിലമ്പൂർ മുനിസിപ്പാലിറ്റി മീറ്റിംഗ് റിപ്പോർട്ടും തീരുമാനങ്ങളും ഇവിടെ അക്ഷരങ്ങളായി വരും..."></textarea>
        <button id="copyBtn" class="btn-blue">📋 Copy Full Report</button>
    </div>
</div>

<script>
    const setupSection = document.getElementById('setupSection');
    const mainSection = document.getElementById('mainSection');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveKeyBtn = document.getElementById('saveKeyBtn');
    const resetKeyBtn = document.getElementById('resetKeyBtn');
    
    const audioFileInput = document.getElementById('audioFile');
    const uploadBtn = document.getElementById('uploadBtn');
    const statusLabel = document.getElementById('statusLabel');
    const outputText = document.getElementById('outputText');
    const copyBtn = document.getElementById('copyBtn');

    window.onload = () => { checkApiKey(); };

    function checkApiKey() {
        const savedKey = localStorage.getItem('swaramApiKey');
        // AQ. um AIza yum support cheyyunnu
        if (savedKey && (savedKey.startsWith("AQ.") || savedKey.startsWith("AIza"))) {
            setupSection.style.display = 'none';
            mainSection.style.display = 'block';
        } else {
            setupSection.style.display = 'block';
            mainSection.style.display = 'none';
        }
    }

    saveKeyBtn.addEventListener('click', () => {
        const key = apiKeyInput.value.trim();
        if (!key.startsWith("AQ.") && !key.startsWith("AIza")) {
            alert("തെറ്റായ API Key! ഗൂഗിളിന്റെ കീ എപ്പോഴും 'AQ.' അല്ലെങ്കിൽ 'AIza' എന്നതിലാണ് തുടങ്ങുക.");
            return;
        }
        localStorage.setItem('swaramApiKey', key);
        apiKeyInput.value = ""; 
        checkApiKey();
    });

    resetKeyBtn.addEventListener('click', () => {
        if(confirm("നിലവിലുള്ള API Key മായ്ച്ചു കളയണമെന്നുറപ്പാണോ?")) {
            localStorage.removeItem('swaramApiKey');
            checkApiKey();
        }
    });

    function fileToBase64(file) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });
    }

    // ===== Audio Chunking Helpers (4MB limit kazhikkan oru file aanenkilum chunks aaki split cheyyum) =====

    const MAX_CHUNK_BYTES = 4 * 1024 * 1024; // 4MB per chunk (API limit kazhikkathirikkan)

    // File-ine AudioBuffer aayi decode cheyyunnu (ethu format aayalum - mp3/m4a/wav okke)
    async function decodeAudioFile(file) {
        const arrayBuffer = await file.arrayBuffer();
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioCtx();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        return { audioBuffer, audioCtx };
    }

    // Browser support cheyyunna best compressed mimeType kandupidikkunnu
    // (WAV-yekkal valare cherutha file size - 10x vare kuravu varum)
    function pickRecorderMimeType() {
        const candidates = [
            'audio/webm;codecs=opus',
            'audio/webm',
            'audio/ogg;codecs=opus',
            'audio/mp4'
        ];
        for (const type of candidates) {
            if (window.MediaRecorder && MediaRecorder.isTypeSupported(type)) return type;
        }
        return null; // ondum support illenkil WAV fallback aayi maarum
    }

    // AudioBuffer-ile [startSample, endSample) range, OfflineAudioContext vechu fast aayi render cheythu,
    // MediaRecorder vechu compressed (webm/opus) Blob aayi encode cheyyunnu.
    function renderAndEncodeChunk(audioBuffer, startSample, endSample, mimeType) {
        return new Promise((resolve, reject) => {
            const numChannels = audioBuffer.numberOfChannels;
            const sampleRate = audioBuffer.sampleRate;
            const frameCount = endSample - startSample;

            // Real-time-il wait cheyyathe vegam render cheyyan OfflineAudioContext upayogikkunnu
            const OfflineCtx = window.OfflineAudioContext || window.webkitOfflineAudioContext;
            const offlineCtx = new OfflineCtx(numChannels, frameCount, sampleRate);

            // Original buffer-il ninnu ee chunk mathram slice cheythu oru puthiya buffer aakkunnu
            const chunkBuffer = offlineCtx.createBuffer(numChannels, frameCount, sampleRate);
            for (let ch = 0; ch < numChannels; ch++) {
                chunkBuffer.copyToChannel(audioBuffer.getChannelData(ch).subarray(startSample, endSample), ch);
            }

            const source = offlineCtx.createBufferSource();
            source.buffer = chunkBuffer;
            source.connect(offlineCtx.destination);
            source.start();

            offlineCtx.startRendering().then((renderedBuffer) => {
                // Render cheytha audio-ine, real-time playback vazhi MediaRecorder upayogichu encode cheyyunnu
                const liveCtx = new (window.AudioContext || window.webkitAudioContext)();
                const dest = liveCtx.createMediaStreamDestination();
                const playSource = liveCtx.createBufferSource();
                playSource.buffer = renderedBuffer;
                playSource.connect(dest); // recording-inu mathram connect cheyyunnu, speaker-il kelkkilla

                // Speech-inu 16kbps mathiyaakum nalla clarity-il - file size pakuthi aakkunnu, AI accuracy-il effect illa
                const recorder = new MediaRecorder(dest.stream, {
                    ...(mimeType ? { mimeType } : {}),
                    audioBitsPerSecond: 16000
                });
                const recordedChunks = [];

                recorder.ondataavailable = (e) => {
                    if (e.data && e.data.size > 0) recordedChunks.push(e.data);
                };
                recorder.onstop = () => {
                    liveCtx.close();
                    const blob = new Blob(recordedChunks, { type: recorder.mimeType || mimeType || 'audio/webm' });
                    resolve(blob);
                };
                recorder.onerror = (e) => {
                    liveCtx.close();
                    reject(e.error || new Error('Recording failed'));
                };

                recorder.start();
                playSource.start();
                playSource.onended = () => {
                    // Buffer flush aakkan oru chinna delay kodukkunnu
                    setTimeout(() => recorder.stop(), 100);
                };
            }).catch(reject);
        });
    }

    // AudioBuffer-ile [startSample, endSample) range-ine WAV (16-bit PCM) Blob aaki convert cheyyunnu
    // (MediaRecorder support illenkil mathram ee fallback upayogikkum)
    function audioBufferSliceToWavBlob(audioBuffer, startSample, endSample) {
        const numChannels = audioBuffer.numberOfChannels;
        const sampleRate = audioBuffer.sampleRate;
        const frameCount = endSample - startSample;

        const channelData = [];
        for (let ch = 0; ch < numChannels; ch++) {
            channelData.push(audioBuffer.getChannelData(ch).subarray(startSample, endSample));
        }

        const bytesPerSample = 2; // 16-bit
        const blockAlign = numChannels * bytesPerSample;
        const dataSize = frameCount * blockAlign;
        const buffer = new ArrayBuffer(44 + dataSize);
        const view = new DataView(buffer);

        function writeString(offset, str) {
            for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
        }

        writeString(0, 'RIFF');
        view.setUint32(4, 36 + dataSize, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * blockAlign, true);
        view.setUint16(32, blockAlign, true);
        view.setUint16(34, 16, true);
        writeString(36, 'data');
        view.setUint32(40, dataSize, true);

        let offset = 44;
        for (let i = 0; i < frameCount; i++) {
            for (let ch = 0; ch < numChannels; ch++) {
                let sample = channelData[ch][i];
                sample = Math.max(-1, Math.min(1, sample));
                view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
                offset += 2;
            }
        }

        return new Blob([buffer], { type: 'audio/wav' });
    }

    // Oru AudioBuffer-ine chunks aayi (samayam anusarichu) split cheythu, ഓരോന്നും compressed
    // (webm/opus muthalava) aayi encode cheythu return cheyyunnu. MediaRecorder support
    // illenkil mathram WAV-ilekku fallback cheyyum.
    async function splitAudioBufferIntoChunks(audioBuffer, onProgress) {
        const sampleRate = audioBuffer.sampleRate;
        const totalSamples = audioBuffer.length;
        const mimeType = pickRecorderMimeType();

        // Compressed encoding cheyyumbol exact output size munpe ariyilla (variable bitrate aanu).
        // Atukondu, oro audio second-um aprox ethra bytes varum ennu estimate cheythu chunk duration kanakkakkunnu.
        // Opus speech-inu 16kbps vechirikkunnu (file size kurakkan); WAV fallback aanenkil PCM size exact aayi kanakkam.

        let chunks = [];

        if (mimeType) {
            // 16kbps opus = ~2000 bytes/sec; safety margin vekkan 70% mathram use cheyyunnu
            const bytesPerSecEstimate = 2000;
            const secondsPerChunk = Math.max(15, Math.floor((MAX_CHUNK_BYTES * 0.7) / bytesPerSecEstimate));
            const samplesPerChunk = Math.floor(secondsPerChunk * sampleRate);

            let chunkIndex = 0;
            const totalChunksEstimate = Math.ceil(totalSamples / samplesPerChunk);

            for (let start = 0; start < totalSamples; start += samplesPerChunk) {
                const end = Math.min(start + samplesPerChunk, totalSamples);
                chunkIndex++;
                if (onProgress) onProgress(chunkIndex, totalChunksEstimate);

                let blob = await renderAndEncodeChunk(audioBuffer, start, end, mimeType);

                // Estimate thettiyathukondu chunk ippozhum valuthaanenkil, koodutal cherutha pieces aayi
                // recursively split cheyyunnu (rare case - safety net mathram).
                if (blob.size > MAX_CHUNK_BYTES && (end - start) > sampleRate * 5) {
                    const mid = start + Math.floor((end - start) / 2);
                    const firstHalf = await renderAndEncodeChunk(audioBuffer, start, mid, mimeType);
                    const secondHalf = await renderAndEncodeChunk(audioBuffer, mid, end, mimeType);
                    chunks.push({ blob: firstHalf, startTime: start / sampleRate, endTime: mid / sampleRate, mimeType });
                    chunks.push({ blob: secondHalf, startTime: mid / sampleRate, endTime: end / sampleRate, mimeType });
                } else {
                    chunks.push({ blob, startTime: start / sampleRate, endTime: end / sampleRate, mimeType });
                }
            }
        } else {
            // Fallback: browser-il MediaRecorder support illenkil WAV upayogikkum (valuthaakum pakshe correct aayirikkum)
            const numChannels = audioBuffer.numberOfChannels;
            const bytesPerSample = 2 * numChannels;
            const samplesPerChunk = Math.floor((MAX_CHUNK_BYTES * 0.9) / bytesPerSample);

            for (let start = 0; start < totalSamples; start += samplesPerChunk) {
                const end = Math.min(start + samplesPerChunk, totalSamples);
                const blob = audioBufferSliceToWavBlob(audioBuffer, start, end);
                chunks.push({ blob, startTime: start / sampleRate, endTime: end / sampleRate, mimeType: 'audio/wav' });
            }
        }

        return chunks;
    }

    function blobToBase64(blob) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = error => reject(error);
        });
    }


    function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${s.toString().padStart(2, '0')}`;
    }

    // Website Web Scraping for Live Councilor Data
    async function fetchCouncilorsData() {
        try {
            const targetUrl = 'https://nilamburmunicipality.lsgkerala.gov.in/en/Elected%20representatives';
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
            
            const response = await fetch(proxyUrl);
            const data = await response.json();
            
            const parser = new DOMParser();
            const doc = parser.parseFromString(data.contents, 'text/html');
            
            let extractedText = "";
            const tables = doc.querySelectorAll('table');
            tables.forEach(table => {
                extractedText += table.innerText + " \n";
            });

            if (extractedText.trim().length > 10) {
                return extractedText;
            } else {
                return null;
            }
        } catch (error) {
            console.error("Scraping Error:", error);
            return null;
        }
    }

    uploadBtn.addEventListener('click', async () => {
        const apiKey = localStorage.getItem('swaramApiKey');
        const file = audioFileInput.files[0];

        if (!file) {
            alert("ദയവായി റെക്കോർഡ് ചെയ്ത മീറ്റിംഗ് ഓഡിയോ തിരഞ്ഞെടുക്കുക!"); return;
        }

        uploadBtn.disabled = true;
        outputText.value = "";

        statusLabel.innerText = "വെബ്സൈറ്റിൽ നിന്നും കൗൺസിലർമാരുടെ പുതിയ വിവരങ്ങൾ ശേഖരിക്കുന്നു...";
        statusLabel.style.color = "#b35900";

        let liveCouncilorData = await fetchCouncilorsData();

        // gemini-1.5-pro ipo shut down aayi (404 varum). Puthiya stable model: gemini-2.5-flash
        const PRIMARY_MODEL = "gemini-2.5-flash";
        const FALLBACK_MODEL = "gemini-2.5-pro"; // primary fail aayal ith try cheyyum

        function buildPromptText(extraTimeContext) {
            let promptText = `Act as a professional Municipality Council Secretary for Nilambur Municipality (നിലമ്പൂർ മുൻസിപ്പാലിറ്റി), Kerala. Listen to this Malayalam council meeting recording. 

[CONTEXT FOR SPEAKER IDENTIFICATION]: 
The current leadership includes Chairperson Padmini Gopinath, Vice Chairperson Shoukkathali Koomanchery, and Secretary Ferose Khan. The council consists of 33 ward members including Gireesh Moloormadathil, Aruma P T, Bushra Muneeb, Mumthas, Sameera K P, Velukutty N, Hamza P V, Musthafa K, Asrath, P M Basheer, Kunhimuhammed, Suresh P, Sreeja, Thongodan Sundaran, Sherly Mol, E S Mujeeb, Paloly Mehaboob, Geetha, Adukkath Ishak, Naicy, Gopinathan, Noorjahan P, Subaida Thattarasseri, Gopalakrishnan P, Unnikrishnan, Shareefa, Daisy Chacko, Mujeeb Devasseri, Sindhu, Sumeera P, Radha P, Binu.

[TASKS]:
1. Transcribe the discussion clearly in Malayalam.
2. Fix all grammatical and speech errors to make it an official document.
3. Identify different speakers accurately by matching their names from the current council list when someone is addressed. Use formats like "ചെയർപേഴ്സൺ പത്മിനി ഗോപിനാഥ്:" or "സെക്രട്ടറി ഫിറോസ് ഖാൻ:".
4. Provide a clear, bulleted summary of the Key Decisions taken at the end.`;

            if (liveCouncilorData) {
                promptText += `\n\n[LIVE COUNCILOR DATA SCRAPED FROM WEBSITE]:\nHere is the latest raw text data from the municipality website containing the names of current elected representatives. Use this data to accurately identify and format the names of the speakers in the transcript:\n\n${liveCouncilorData}`;
            }

            if (extraTimeContext) {
                promptText += `\n\n${extraTimeContext}`;
            }

            return promptText;
        }

        async function callGemini(modelName, promptText, base64Audio, mimeType) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: promptText },
                            { inlineData: { mimeType: mimeType, data: base64Audio } }
                        ]
                    }]
                })
            });
            return await res.json();
        }

        function isModelMissingError(data) {
            return data.error && (
                data.error.code === 404 ||
                (data.error.message && data.error.message.toLowerCase().includes("not found")) ||
                (data.error.message && data.error.message.toLowerCase().includes("not supported"))
            );
        }

        // Oru chunk transcribe cheyyunnu, error type return cheyyunnu (success aanenkil text return cheyyum)
        async function transcribeChunk(base64Audio, mimeType, promptText) {
            let data = await callGemini(PRIMARY_MODEL, promptText, base64Audio, mimeType);

            if (isModelMissingError(data)) {
                data = await callGemini(FALLBACK_MODEL, promptText, base64Audio, mimeType);
            }

            if (data.error) {
                return { error: data.error };
            }
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                return { text: data.candidates[0].content.parts[0].text };
            }
            return { error: { message: "മറുപടി ലഭിക്കുന്നതിൽ തകരാർ സംഭവിച്ചു." } };
        }

        function showApiError(err) {
            console.error("API Error:", err);
            if (err.code === 429) {
                statusLabel.innerText = "Error 429: ഇപ്പോൾ ഉപയോഗം കൂടുതലാണ് (Rate Limit). കുറച്ച് സമയത്തിന് ശേഷം വീണ്ടും ശ്രമിക്കുക.";
            } else if (err.code === 400 || err.status === "INVALID_ARGUMENT" || err.code === 401) {
                statusLabel.innerText = "API Key തകരാർ: താങ്കൾ നൽകിയ കീ പ്രവർത്തിക്കുന്നില്ല. പുതിയ കീ നൽകുക.";
                localStorage.removeItem('swaramApiKey');
                checkApiKey();
            } else {
                statusLabel.innerText = `Error: ${err.message}`;
            }
            statusLabel.style.color = "#d32f2f";
        }

        try {
            // 4MB-il koduthal aanenkil mathram chunk aaki split cheyyum, illenkil neratte process cheyyum
            if (file.size <= MAX_CHUNK_BYTES) {
                statusLabel.innerText = "ഓഡിയോ പ്രോസസ്സ് ചെയ്യുന്നു... വലിയ മീറ്റിംഗുകൾക്ക് അല്പം സമയമെടുക്കും.";
                statusLabel.style.color = "#1976d2";

                const base64Audio = await fileToBase64(file);
                const mimeType = file.type || "audio/mp3";
                const promptText = buildPromptText(null);

                const result = await transcribeChunk(base64Audio, mimeType, promptText);

                if (result.error) {
                    showApiError(result.error);
                } else {
                    outputText.value = result.text;
                    statusLabel.innerText = "റിപ്പോർട്ട് തയ്യാറാക്കൽ പൂർത്തിയായി! ✨";
                    statusLabel.style.color = "#2e7d32";
                }
            } else {
                // File valuthaanu - decode cheythu samayam anusarich compressed chunks aaki murikkunnu
                statusLabel.innerText = "വലിയ ഫയൽ ആയതിനാൽ ഭാഗങ്ങളായി തിരിച്ച് compress ചെയ്യുന്നു...";
                statusLabel.style.color = "#b35900";

                const { audioBuffer, audioCtx } = await decodeAudioFile(file);

                const chunks = await splitAudioBufferIntoChunks(audioBuffer, (done, total) => {
                    statusLabel.innerText = `ഭാഗങ്ങളായി തിരിച്ച് compress ചെയ്യുന്നു... (${done} / ${total})`;
                });

                audioCtx.close();

                const collectedTexts = [];

                for (let i = 0; i < chunks.length; i++) {
                    const chunk = chunks[i];
                    statusLabel.innerText = `ഭാഗം ${i + 1} / ${chunks.length} പ്രോസസ്സ് ചെയ്യുന്നു (${formatTime(chunk.startTime)} - ${formatTime(chunk.endTime)})...`;
                    statusLabel.style.color = "#1976d2";

                    const base64Audio = await blobToBase64(chunk.blob);
                    const mimeType = chunk.mimeType || "audio/webm";

                    const timeContext = `[NOTE]: This is part ${i + 1} of ${chunks.length} of a longer meeting recording, covering roughly ${formatTime(chunk.startTime)} to ${formatTime(chunk.endTime)} of the full meeting. Transcribe only what is heard in this segment. Do not repeat instructions or add a separate summary section for this part — a combined summary will be added at the end separately.`;
                    const promptText = buildPromptText(timeContext);

                    const result = await transcribeChunk(base64Audio, mimeType, promptText);

                    if (result.error) {
                        showApiError(result.error);
                        outputText.value = collectedTexts.join("\n\n");
                        uploadBtn.disabled = false;
                        return;
                    }

                    collectedTexts.push(`--- ഭാഗം ${i + 1} (${formatTime(chunk.startTime)} - ${formatTime(chunk.endTime)}) ---\n${result.text}`);
                    outputText.value = collectedTexts.join("\n\n");
                }

                statusLabel.innerText = `എല്ലാ ${chunks.length} ഭാഗങ്ങളും പൂർത്തിയായി! റിപ്പോർട്ട് തയ്യാറാണ് ✨`;
                statusLabel.style.color = "#2e7d32";
            }

        } catch (err) {
            console.error(err);
            statusLabel.innerText = "നെറ്റ്‌വർക്ക് തകരാർ! ഇന്റർനെറ്റ് കണക്ഷൻ പരിശോധിക്കുക.";
            statusLabel.style.color = "#d32f2f";
        }

        uploadBtn.disabled = false;
    });

    copyBtn.addEventListener('click', () => {
        if (!outputText.value) {
            alert("കോപ്പി ചെയ്യാൻ വിവരങ്ങളില്ല!"); return;
        }
        navigator.clipboard.writeText(outputText.value).then(() => {
            alert("റിപ്പോർട്ട് പൂർണ്ണമായും കോപ്പിയായി! ഇത് നേരിട്ട് ഉപയോഗിക്കാം.");
        });
    });
</script>
